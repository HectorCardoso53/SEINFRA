<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Serviços da SEINFRA</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/assets/css/servicos.css">
</head>

<body>

  <!-- HEADER -->

  <div class="header">

    <img src="assets/img/prefeitura.png" class="header-logo">

    <h2>Infrasis</h2>

    <p>SEINFRA – Secretaria de Infraestrutura</p>

    <span>Secretária: Liliana Bentes</span>

  </div>

  <!-- CARDS -->

  <div class="cards">

    <div class="card" id="btn-visita" onclick="abrirAgendamento()">

      <div class="icon">
        <i class="bi bi-calendar-check"></i>
      </div>

      <h3>Agendamento</h3>

      <p>Cadastro de visitas</p>

    </div>

    <div class="card" id="btn-os" onclick="abrirOS()">

      <div class="icon">
        <i class="bi bi-tools"></i>
      </div>

      <h3>Ordem de Serviço</h3>

      <p>Gerenciamento das OS</p>

    </div>

  </div>

  <!-- FOOTER -->

  <div class="footer">

    <div class="footer-content">

      <span>
        SEMEG – Secretaria de Eficiência Governamental
      </span>

      <span>
        Prefeitura Municipal de Oriximiná
      </span>

    </div>

  </div>

  <script type="module">
    import { auth, db } from "./assets/js/firebase.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    function bloquear(el) {
      el.classList.add("disabled");
    }

    window.abrirAgendamento = function () {
      window.location.href = "home.html";
    };

    window.abrirOS = function () {
      window.location.href = "dashboard.html";
    };


    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        alert("Usuário sem cadastro");
        return;
      }

      const data = snap.data();
      const btnVisita = document.getElementById("btn-visita");
      const btnOS = document.getElementById("btn-os");

      if (data.role === "os") {
        bloquear(btnVisita);          // só OS liberado

      } else if (data.role === "visita") {
        bloquear(btnOS);              // só Visita liberado

      } else if (data.role === "master" || data.role === "admin") {
        // nenhum bloqueio — acessa tudo

      } else {
        bloquear(btnVisita);          // role desconhecida: bloqueia tudo
        bloquear(btnOS);
      }
    });


  </script>

</body>

</html>
