services:
  postgres:
    image: postgres:16-alpine
    container_name: seinfra_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: seinfra
      POSTGRES_USER: seinfra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seinfra"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: seinfra_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://seinfra:${POSTGRES_PASSWORD}@postgres:5432/seinfra
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    ports:
      - "3004:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
