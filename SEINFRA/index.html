<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/img/prefeitura.png">
    <title>Login – Sistema OS</title>
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="login-body">
    <div class="login-container">
        <!-- Cabeçalho institucional -->
        <div class="login-header">
            <img src="assets/img/prefeitura.png" alt="Prefeita" class="login-photo">
            <h2>INFRASIS</h2>
            <p>SEINFRA – Secretaria de infraestrutura</p>
            <span>Secretária: Liliana Bentes</span>
        </div>

        <!-- Formulário -->
        <div class="login-form">

            <div class="input-group">
                <input type="email" id="email" placeholder="E-mail institucional">
                <span class="error-msg" id="email-error">
                    <i class="bi bi-exclamation-circle"></i> Informe o e-mail
                </span>
            </div>

            <div class="input-group">
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Senha">
                    <button type="button" class="toggle-senha" onclick="toggleSenha()" tabindex="-1">
                        <i class="bi bi-eye" id="icone-olho"></i>
                    </button>
                </div>
                <span class="error-msg" id="password-error">
                    <i class="bi bi-exclamation-circle"></i> Informe a senha
                </span>
            </div>

            <div class="progress-container" id="login-loading">
                <div class="progress-bar"></div>
            </div>

            <button id="btn-login" onclick="login()">Entrar</button>
        </div>


        <!-- Rodapé -->
        <footer class="login-footer">
            <p>© <span id="ano-footer"></span> – SEMEG</p>
            <p>Secretaria de Eficiência Governamental</p>
        </footer>
        <script>document.getElementById('ano-footer').textContent = new Date().getFullYear();</script>

    </div>

    <script type="module" src="assets/js/auth.js"></script>
    <script>
      function toggleSenha() {
        const input = document.getElementById("password");
        const icone = document.getElementById("icone-olho");
        if (input.type === "password") {
          input.type = "text";
          icone.className = "bi bi-eye-slash";
        } else {
          input.type = "password";
          icone.className = "bi bi-eye";
        }
      }
    </script>
</body>

</html>
