<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços da SEINFRA</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/servicos.css">
</head>

<body>

  <!-- HEADER -->

  <div class="header">

    <img src="assets/img/prefeitura.png" class="header-logo">

    <h2>Infrasis</h2>

    <p>SEINFRA – Secretaria de Infraestrutura</p>

    <span>Secretária: Liliana Bentes</span>

  </div>


  <!-- CARDS -->

  <div class="cards">

    <div class="card" id="btn-visita" onclick="abrirAgendamento()">
      <div class="icon">
        <i class="bi bi-calendar-check"></i>
      </div>
      <div class="card-text">
        <h3>Agendamento</h3>
        <p>Cadastro de visitas</p>
      </div>
    </div>

    <div class="card" id="btn-os" onclick="abrirOS()">
      <div class="icon">
        <i class="bi bi-tools"></i>
      </div>
      <div class="card-text">
        <h3>Ordem de Serviço</h3>
        <p>Gerenciamento das OS</p>
      </div>
    </div>

  </div>

  <!-- FOOTER -->

  <div class="footer">

    <div class="footer-content">

      <span>
        SEMEG – Secretaria de Eficiência Governamental
      </span>

      <span>
        Prefeitura Municipal de Oriximiná
      </span>

    </div>

  </div>

  <script type="module">
    import { getUser } from "./assets/js/api.js";
    import "./assets/js/auth.js";

    function bloquear(el) {
      if (el) el.classList.add("disabled");
    }

    window.abrirAgendamento = function () {
      window.location.href = "home.html";
    };

    window.abrirOS = function () {
      window.location.href = "dashboard.html";
    };

    const user = getUser();
    if (user) {
      const btnVisita = document.getElementById("btn-visita");
      const btnOS     = document.getElementById("btn-os");

      if (user.role === "os")          bloquear(btnVisita);
      else if (user.role === "visita") bloquear(btnOS);
      else if (user.role !== "master" && user.role !== "admin") {
        bloquear(btnVisita);
        bloquear(btnOS);
      }
    }
  </script>

</body>

</html>
